><li><a href=/tags>Tags</a></li><li><a href></a></li></ul></nav></div><div class=post-header><h1 class=title>風邪</h1><div class=meta>Posted at &mdash; Mar 30, 2020</div></div><div class=markdown><p>今日は月曜日です。 <ruby>朝<rp>(</rp><rt>あさ</rt><rp>)</rp></ruby>まで雨が<ruby>降<rp>(</rp><rt>ふ</rt><rp>)</rp></ruby>っていました。</p><p><ruby>昨日<rp>(</rp><rt>きのう</rt><rp>)</rp></ruby>は<ruby>大雨<rp>(</rp><rt>おおあめ</rt><rp>)</rp></ruby>が降って、<ruby>急<rp>(</rp><rt>きゅう</rt><rp>)</rp></ruby>に<ruby>風邪<rp>(</rp><rt>かぜ</rt><rp>)</rp></ruby>をひいてしまいました<sup id=fnref:1><a href=#fn:1 class=footnote-ref role=doc-noteref>1</a></sup>。 だから今日は<ruby>事務所<rp>(</rp><rt>じむしょ</rt><rp>)</rp></ruby>に<ruby>行<rp>(</rp><rt>い</rt><rp>)</rp></ruby>かなかった。</p><p><ruby>一日中<rp>(</rp><rt>いちにちじゅう</rt><rp>)</rp></ruby><ruby>寝<rp>(</rp><rt>ね</rt><rp>)</rp></ruby>ていて、とても<ruby>寂しい<rp>(</rp><rt>さびしい</rt><rp>)</rp></ruby><ruby>思い<rp>(</rp><rt>おもい</rt><rp>)</rp></ruby>をしています。</p><section class=footnotes role=doc-endnotes><hr><ol><li id=fn:1 role=doc-endnote><p>ひいてしまいました：染上感冒。 <a href=#fnref:1 class=footnote-backref role=doc-backlink>&#8617;&#xfe0e;</a></p></li></ol></section></div><div class=post-tags></div><script src=https://utteranc.es/client.js repo=AuTa/burogu issue-term=title theme=github-light crossorigin=anonymous async></script></div><div class="footer wrapper"><nav class=nav><div>© 2020 AuTa | <a href=https://github.com/vividvilla/ezhil>Ezhil theme</a> | Built with <a href=https://gohugo.io>Hugo</a></div></nav></div><script type=application/javascript>var doNotTrack=false;if(!doNotTrack){window.ga=window.ga||function(){(ga.q=ga.q||[]).push(arguments)};ga.l=+new Date;ga('create','UA-56510552-2','auto');ga('send','pageview');}</script><script async src=https://www.google-analytics.com/analytics.js></script><script>feather.replace()</script></body></html>
